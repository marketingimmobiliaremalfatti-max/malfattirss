name: Aggiorna feed RSS Immobiliare Malfatti

on:
  schedule:
    # Ogni giorno alle 6:00 UTC (7:00 ora italiana in inverno, 8:00 in estate).
    # Necessario che giri OGNI GIORNO: la rotazione giornaliera (che garantisce
    # sempre un contenuto "nuovo" per Postpikr) avanza di uno step per ogni
    # giorno di calendario in cui lo script viene eseguito.
    - cron: "0 6 * * *"
  workflow_dispatch: {} # permette di far partire il workflow manualmente da GitHub

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa le dipendenze
        run: pip install -r requirements.txt

      - name: Esegui lo scraper e genera il feed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper.py

      - name: Commit e push se ci sono cambiamenti
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/rss.xml docs/images/ data/state.json data/rotation.json
          git diff --staged --quiet || git commit -m "Aggiorna feed RSS annunci [automatico]"
          git push
